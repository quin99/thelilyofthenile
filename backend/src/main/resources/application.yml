spring:
  application:
    name: backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/thelilyofthenile_db}
    username: ${DB_USERNAME:thelilyofthenile_user}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:changeme-use-a-real-secret-in-production}

stripe:
  secret-key: ${STRIPE_SECRET_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
