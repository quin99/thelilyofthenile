<article style="position:relative;background:#261414;border:1px solid #3a2020;transition:border-color .3s;">

  <!-- Image -->
  <a [routerLink]="['/product', product().id]"
     style="display:block;aspect-ratio:3/4;overflow:hidden;background:#2e1a1a;position:relative;">
    @if (product().imageUrl) {
      <img [src]="product().imageUrl" [alt]="product().name"
           style="width:100%;height:100%;object-fit:cover;transition:transform .7s;"
           onmouseover="this.style.transform='scale(1.05)'"
           onmouseout="this.style.transform='scale(1)'">
    } @else {
      <div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#2e1a1a;">
        <svg xmlns="http://www.w3.org/2000/svg" style="width:48px;height:48px;color:#3a2020;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
      </div>
    }
    @if (product().stock === 0) {
      <div style="position:absolute;inset:0;background:rgba(26,15,15,0.7);display:flex;align-items:center;justify-content:center;">
        <span style="font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#b8a89a;border:1px solid #3a2020;padding:4px 12px;">
          Sold Out
        </span>
      </div>
    }
  </a>

  <!-- Info -->
  <div style="padding:16px;">
    <p style="font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#c9a96e;margin-bottom:4px;">{{ product().category }}</p>
    <a [routerLink]="['/product', product().id]"
       style="font-family:'Playfair Display',serif;font-size:15px;font-weight:300;color:#f5ede0;text-decoration:none;display:block;line-height:1.4;">
      {{ product().name }}
    </a>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:12px;">
      <span style="color:#f5ede0;font-size:13px;">{{ product().price | currency:'USD':'symbol':'1.2-2' }}</span>
      <button
        (click)="addToCart.emit(product())"
        [disabled]="product().stock === 0"
        style="font-size:9px;letter-spacing:.2em;text-transform:uppercase;padding:6px 12px;border:none;cursor:pointer;font-family:'Raleway',sans-serif;transition:all .2s;"
        [style.background]="justAdded() ? '#c9a96e' : 'transparent'"
        [style.color]="justAdded() ? '#1a0f0f' : '#c9a96e'"
        [style.border]="justAdded() ? '1px solid #c9a96e' : '1px solid rgba(201,169,110,0.6)'"
        [style.opacity]="product().stock === 0 ? '0.3' : '1'">
        {{ justAdded() ? '✓ Added' : 'Add to Cart' }}
      </button>
    </div>
  </div>
</article>
