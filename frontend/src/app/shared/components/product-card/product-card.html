<article class="group relative bg-brand-surface border border-brand-border hover:border-brand-gold/50 transition-all duration-300">

  <!-- Image -->
  <a [routerLink]="['/product', product().id]" class="block aspect-[3/4] overflow-hidden bg-brand-raised relative">
    @if (product().imageUrl) {
      <img [src]="product().imageUrl" [alt]="product().name"
           class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
    } @else {
      <div class="w-full h-full flex items-center justify-center bg-brand-raised">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-brand-border" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
      </div>
    }
    @if (product().stock === 0) {
      <div class="absolute inset-0 bg-brand-bg/70 flex items-center justify-center">
        <span class="text-[10px] tracking-widest uppercase text-brand-ivory-dim border border-brand-border px-3 py-1">
          Sold Out
        </span>
      </div>
    }
  </a>

  <!-- Info -->
  <div class="p-4">
    <p class="text-[10px] tracking-widest uppercase text-brand-gold mb-1">{{ product().category }}</p>
    <a [routerLink]="['/product', product().id]"
       class="font-display text-brand-ivory text-base leading-snug hover:text-brand-gold transition-colors line-clamp-2">
      {{ product().name }}
    </a>
    <div class="flex items-center justify-between mt-3">
      <span class="text-brand-ivory text-sm">{{ product().price | currency:'GBP':'symbol':'1.2-2' }}</span>
      <button
        (click)="addToCart.emit(product())"
        [disabled]="product().stock === 0"
        class="text-[10px] tracking-widest uppercase border border-brand-gold/60 text-brand-gold px-3 py-1.5
               hover:bg-brand-gold hover:text-brand-bg transition-all duration-200
               disabled:opacity-30 disabled:cursor-not-allowed">
        Add to Cart
      </button>
    </div>
  </div>
</article>
