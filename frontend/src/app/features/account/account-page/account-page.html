<div style="min-height:100vh;padding-top:80px;display:flex;align-items:center;justify-content:center;padding-left:24px;padding-right:24px;background:#1a0f0f;">
  <div style="width:100%;max-width:420px;">

    <!-- Header -->
    <div style="text-align:center;margin-bottom:40px;">
      <p style="font-size:9px;letter-spacing:.4em;text-transform:uppercase;color:#c9a96e;margin-bottom:12px;">Welcome</p>
      <h1 style="font-family:'Playfair Display',serif;font-size:28px;font-weight:300;color:#f5ede0;letter-spacing:.06em;">Your Account</h1>
    </div>

    <!-- Tab toggle -->
    <div style="display:flex;border:1px solid #3a2020;margin-bottom:32px;">
      <button (click)="tab.set('login')"
              style="flex:1;padding:12px;font-size:9px;letter-spacing:.2em;text-transform:uppercase;border:none;cursor:pointer;transition:background .2s,color .2s;"
              [style.background]="tab() === 'login' ? '#261414' : 'transparent'"
              [style.color]="tab() === 'login' ? '#f5ede0' : '#b8a89a'">
        Sign In
      </button>
      <button (click)="tab.set('register')"
              style="flex:1;padding:12px;font-size:9px;letter-spacing:.2em;text-transform:uppercase;border:none;border-left:1px solid #3a2020;cursor:pointer;transition:background .2s,color .2s;"
              [style.background]="tab() === 'register' ? '#261414' : 'transparent'"
              [style.color]="tab() === 'register' ? '#f5ede0' : '#b8a89a'">
        Register
      </button>
    </div>

    <!-- Success banner -->
    @if (registered()) {
      <p style="font-size:11px;text-align:center;margin-bottom:24px;border:1px solid rgba(201,169,110,.3);padding:12px;color:#c9a96e;letter-spacing:.05em;">
        Account created — sign in below.
      </p>
    }

    <!-- Error banner -->
    @if (error()) {
      <p style="font-size:11px;text-align:center;margin-bottom:24px;color:#e8b4a0;">{{ error() }}</p>
    }

    <!-- Login form -->
    @if (tab() === 'login') {
      <form (ngSubmit)="login()" style="display:flex;flex-direction:column;gap:16px;">
        <div>
          <label style="display:block;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#b8a89a;margin-bottom:8px;">Email</label>
          <input type="email" [(ngModel)]="loginForm.email" name="email" required
                 placeholder="your@email.com"
                 style="width:100%;background:#261414;border:1px solid #3a2020;color:#f5ede0;padding:12px 16px;font-size:13px;font-family:'Raleway',sans-serif;outline:none;box-sizing:border-box;">
        </div>
        <div>
          <label style="display:block;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#b8a89a;margin-bottom:8px;">Password</label>
          <input type="password" [(ngModel)]="loginForm.password" name="password" required
                 placeholder="••••••••"
                 style="width:100%;background:#261414;border:1px solid #3a2020;color:#f5ede0;padding:12px 16px;font-size:13px;font-family:'Raleway',sans-serif;outline:none;box-sizing:border-box;">
        </div>
        <button type="submit" [disabled]="loading()"
                style="margin-top:8px;width:100%;padding:14px;background:#c9a96e;color:#1a0f0f;font-size:9px;letter-spacing:.2em;text-transform:uppercase;border:none;cursor:pointer;font-family:'Raleway',sans-serif;font-weight:500;transition:background .2s;"
                [style.opacity]="loading() ? '0.6' : '1'">
          {{ loading() ? 'Signing In…' : 'Sign In' }}
        </button>
      </form>
    }

    <!-- Register form -->
    @if (tab() === 'register') {
      <form (ngSubmit)="register()" style="display:flex;flex-direction:column;gap:16px;">
        <div>
          <label style="display:block;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#b8a89a;margin-bottom:8px;">Name</label>
          <input type="text" [(ngModel)]="registerForm.username" name="username" required
                 placeholder="Your name"
                 style="width:100%;background:#261414;border:1px solid #3a2020;color:#f5ede0;padding:12px 16px;font-size:13px;font-family:'Raleway',sans-serif;outline:none;box-sizing:border-box;">
        </div>
        <div>
          <label style="display:block;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#b8a89a;margin-bottom:8px;">Email</label>
          <input type="email" [(ngModel)]="registerForm.email" name="email" required
                 placeholder="your@email.com"
                 style="width:100%;background:#261414;border:1px solid #3a2020;color:#f5ede0;padding:12px 16px;font-size:13px;font-family:'Raleway',sans-serif;outline:none;box-sizing:border-box;">
        </div>
        <div>
          <label style="display:block;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#b8a89a;margin-bottom:8px;">Password</label>
          <input type="password" [(ngModel)]="registerForm.password" name="password" required minlength="8"
                 placeholder="Min. 8 characters"
                 style="width:100%;background:#261414;border:1px solid #3a2020;color:#f5ede0;padding:12px 16px;font-size:13px;font-family:'Raleway',sans-serif;outline:none;box-sizing:border-box;">
        </div>
        <button type="submit" [disabled]="loading()"
                style="margin-top:8px;width:100%;padding:14px;background:#c9a96e;color:#1a0f0f;font-size:9px;letter-spacing:.2em;text-transform:uppercase;border:none;cursor:pointer;font-family:'Raleway',sans-serif;font-weight:500;transition:background .2s;"
                [style.opacity]="loading() ? '0.6' : '1'">
          {{ loading() ? 'Creating Account…' : 'Create Account' }}
        </button>
      </form>
    }

  </div>
</div>
