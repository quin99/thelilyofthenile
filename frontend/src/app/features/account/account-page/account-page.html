<div class="pt-16 min-h-screen flex items-center justify-center px-6 py-24">
  <div class="w-full max-w-md">

    <!-- Header -->
    <div class="text-center mb-10">
      <p class="text-[10px] tracking-[0.4em] uppercase text-brand-gold mb-3">Welcome</p>
      <h1 class="font-display text-brand-ivory text-3xl">Your Account</h1>
    </div>

    <!-- Tab toggle -->
    <div class="flex border border-brand-border mb-8">
      <button (click)="tab.set('login')"
              [class.bg-brand-surface]="tab() === 'login'"
              [class.text-brand-ivory]="tab() === 'login'"
              class="flex-1 py-3 text-[10px] tracking-widest uppercase text-brand-ivory-dim hover:text-brand-ivory transition-all duration-200">
        Sign In
      </button>
      <button (click)="tab.set('register')"
              [class.bg-brand-surface]="tab() === 'register'"
              [class.text-brand-ivory]="tab() === 'register'"
              class="flex-1 py-3 text-[10px] tracking-widest uppercase text-brand-ivory-dim hover:text-brand-ivory transition-all duration-200 border-l border-brand-border">
        Register
      </button>
    </div>

    <!-- Error -->
    @if (error()) {
      <p class="text-brand-blush text-xs text-center mb-6 tracking-wide">{{ error() }}</p>
    }

    <!-- Login form -->
    @if (tab() === 'login') {
      <form (ngSubmit)="login()" class="flex flex-col gap-4">
        <div>
          <label class="block text-[10px] tracking-widest uppercase text-brand-ivory-dim mb-2">Email</label>
          <input type="email" [(ngModel)]="loginForm.email" name="email" required
                 class="w-full bg-brand-surface border border-brand-border text-brand-ivory px-4 py-3 text-sm
                        focus:outline-none focus:border-brand-gold transition-colors placeholder:text-brand-ivory-dim/40"
                 placeholder="your@email.com">
        </div>
        <div>
          <label class="block text-[10px] tracking-widest uppercase text-brand-ivory-dim mb-2">Password</label>
          <input type="password" [(ngModel)]="loginForm.password" name="password" required
                 class="w-full bg-brand-surface border border-brand-border text-brand-ivory px-4 py-3 text-sm
                        focus:outline-none focus:border-brand-gold transition-colors placeholder:text-brand-ivory-dim/40"
                 placeholder="••••••••">
        </div>
        <button type="submit" [disabled]="loading()"
                class="mt-2 w-full py-3.5 bg-brand-gold text-brand-bg text-xs tracking-widest uppercase
                       hover:bg-brand-gold-light transition-colors duration-200 disabled:opacity-50">
          {{ loading() ? 'Signing In...' : 'Sign In' }}
        </button>
      </form>
    }

    <!-- Register form -->
    @if (tab() === 'register') {
      <form (ngSubmit)="register()" class="flex flex-col gap-4">
        <div>
          <label class="block text-[10px] tracking-widest uppercase text-brand-ivory-dim mb-2">Name</label>
          <input type="text" [(ngModel)]="registerForm.username" name="username" required
                 class="w-full bg-brand-surface border border-brand-border text-brand-ivory px-4 py-3 text-sm
                        focus:outline-none focus:border-brand-gold transition-colors placeholder:text-brand-ivory-dim/40"
                 placeholder="Your name">
        </div>
        <div>
          <label class="block text-[10px] tracking-widest uppercase text-brand-ivory-dim mb-2">Email</label>
          <input type="email" [(ngModel)]="registerForm.email" name="email" required
                 class="w-full bg-brand-surface border border-brand-border text-brand-ivory px-4 py-3 text-sm
                        focus:outline-none focus:border-brand-gold transition-colors placeholder:text-brand-ivory-dim/40"
                 placeholder="your@email.com">
        </div>
        <div>
          <label class="block text-[10px] tracking-widest uppercase text-brand-ivory-dim mb-2">Password</label>
          <input type="password" [(ngModel)]="registerForm.password" name="password" required minlength="8"
                 class="w-full bg-brand-surface border border-brand-border text-brand-ivory px-4 py-3 text-sm
                        focus:outline-none focus:border-brand-gold transition-colors placeholder:text-brand-ivory-dim/40"
                 placeholder="Min. 8 characters">
        </div>
        <button type="submit" [disabled]="loading()"
                class="mt-2 w-full py-3.5 bg-brand-gold text-brand-bg text-xs tracking-widest uppercase
                       hover:bg-brand-gold-light transition-colors duration-200 disabled:opacity-50">
          {{ loading() ? 'Creating Account...' : 'Create Account' }}
        </button>
      </form>
    }
  </div>
</div>
